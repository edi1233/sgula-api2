apiVersion: v1
kind: Service
metadata:
  name: sgula-api
  labels:
    app.kubernetes.io/name: sgula-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sgula-api
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgula-api
  labels:
    app.kubernetes.io/name: sgula-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sgula-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sgula-api
    spec:
      volumes:
        - name: sgula-admin-ui-overlay
          configMap:
            name: sgula-admin-ui-overlay
      containers:
        - name: api
          image: harbor.edi-it.com/library/sgula-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: sgula-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: sgula
            - name: PGSSLMODE
              value: no-verify
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: sgula-app.sgula-db.credentials.postgresql.acid.zalan.do
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sgula-app.sgula-db.credentials.postgresql.acid.zalan.do
                  key: password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sgula-api-secrets
                  key: ADMIN_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: sgula-api-secrets
                  key: SESSION_SECRET
          volumeMounts:
            - name: sgula-admin-ui-overlay
              mountPath: /app/public/admin.html
              subPath: admin.html
              readOnly: true
            - name: sgula-admin-ui-overlay
              mountPath: /app/public/style.css
              subPath: style.css
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
