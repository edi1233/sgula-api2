apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sgula-site
  labels:
    app.kubernetes.io/name: sgula-site
  annotations:
    external-dns.alpha.kubernetes.io/target: 192.168.2.202
spec:
  hostnames:
    - sgula.edi-it.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: envoy-gateway-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: sgula-api
          port: 3000
    - matches:
        - path:
            type: Exact
            value: /admin
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /admin.html
      backendRefs:
        - name: sgula-api
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: sgula-api
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sgula-site-http-redirect
  labels:
    app.kubernetes.io/name: sgula-site
  annotations:
    external-dns.alpha.kubernetes.io/target: 192.168.2.202
spec:
  hostnames:
    - sgula.edi-it.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
